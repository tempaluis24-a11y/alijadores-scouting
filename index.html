<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alijadores Scouting</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between">

    <main class="container mx-auto px-4 py-8 max-w-4xl">
        <header class="mb-8">
            <h1 class="text-3xl font-extrabold text-white">Alijadores de Estación Naranjo</h1>
            <p class="text-slate-400 mt-1">Sistema de Scouting de Béisbol</p>
        </header>

        <!-- Formulario de Registro -->
        <section class="bg-slate-800 border border-slate-700 rounded-xl p-6 shadow-lg">
            <h2 class="text-xl font-bold text-slate-100 mb-4">Registro para el Sistema de Scouting</h2>
            
            <form id="registroForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-slate-300 mb-1">Nombre del Equipo</label>
                    <input type="text" id="equipoNombre" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-slate-100" placeholder="Ej. Alijadores" required>
                </div>
                
                <div>
                    <label class="block text-sm text-slate-300 mb-1">Nombre del Jugador</label>
                    <input type="text" id="jugadorNombre" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-slate-100" placeholder="Ej. Juan Pérez" required>
                </div>

                <div>
                    <label class="block text-sm text-slate-300 mb-1">Posición Principal</label>
                    <select id="jugadorPosicion" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-slate-100">
                        <option value="P">Pitcher (P)</option>
                        <option value="C">Catcher (C)</option>
                        <option value="1B">Primera Base (1B)</option>
                        <option value="2B">Segunda Base (2B)</option>
                        <option value="3B">Tercera Base (3B)</option>
                        <option value="SS">Shortstop (SS)</option>
                        <option value="OF">Jardinero (OF)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm text-slate-300 mb-1">Bateo / Perfil</label>
                    <input type="text" id="jugadorPerfil" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-slate-100" placeholder="Ej. Derecho / Contacto">
                </div>

                <div class="md:col-span-2">
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-2 px-4 rounded transition">
                        Guardar Registro en el Sistema
                    </button>
                </div>
            </form>
        </section>
    </main>

    <footer class="bg-slate-800 border-t border-slate-700 py-4 text-center text-xs text-slate-500">
        &copy; 2026 Alijadores Scouting &bull; Todos los derechos reservados.
    </footer>

    <!-- Scripts de la Aplicación -->
    <script src="app.js"></script>
    <script src="login.js"></script>
    <script src="jugadores.js"></script>
    <script src="estadisticas.js"></script>
    <script src="reportes.js"></script>
</body>
</html>
